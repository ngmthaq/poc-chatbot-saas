# Compose v2 — no `version:` key (Docker ignores it on v2 anyway).
#
# Three services on a default bridge network for THIS project only:
#   - backend   : the NestJS API; only service with a published host port.
#   - redis     : cache + BullMQ broker for backend. INDEPENDENT of the
#                 redis instance in `livekit-server/` (different project,
#                 different network, different named volume).
#   - mariadb   : Prisma datasource. Internal-only (no published port).
#
# Secrets come from `.env`, which is created by `scripts/bootstrap.sh`.
# Redis and MariaDB never publish ports to the host — they are reachable
# only on the backend project's internal compose network.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      # Only the API port is exposed. Front with a TLS-terminating reverse
      # proxy (Caddy/Nginx) for any deployment that takes internet traffic.
      # `:?err` makes compose fail fast with a friendly message if the var
      # is unset — i.e. someone ran `docker compose up` before bootstrap.
      - "${PORT:?run scripts/bootstrap.sh first}:${PORT:?run scripts/bootstrap.sh first}"
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    volumes:
      # Persist local file-storage uploads across container recreation. When
      # `FILE_STORAGE_DRIVER=s3` this volume is unused but harmless.
      - backend-uploads:/app/uploads
    healthcheck:
      # `wget` ships in busybox-alpine — no extra apk install needed. Probe
      # the dedicated /health route (mounted under the global API prefix +
      # URI versioning) which is marked @Public() so JwtAuthGuard lets it
      # through. A 200 here means Nest finished bootstrapping (DI graph
      # resolved, Prisma + Redis adapters connected) rather than only that
      # the TCP socket is open.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:${PORT}/${API_PREFIX}/v1/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      # Generous start period: Prisma migrate deploy + NestJS bootstrap on
      # a cold cache can take >10s on a small VM.
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    # Shell-form (`sh -c`) is required: exec-form skips the shell, so
    # `$REDIS_PASSWORD` would be passed literally to redis-server instead of
    # expanded. Compose un-escapes `$$` to `$` at parse-time, so the in-
    # container shell sees `$REDIS_PASSWORD` and expands it from the env
    # loaded via `env_file`. Leading `exec` replaces the shell with redis-
    # server so it inherits PID 1 and `docker compose down` signals it cleanly.
    command: ["sh", "-c", "exec redis-server /usr/local/etc/redis/redis.conf --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    # No `ports:` — Redis is reachable only on the internal compose network.
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mariadb:
    # Pinned LTS major. Official image ships `healthcheck.sh` and the
    # MariaDB-native env vars (MARIADB_*) used below.
    image: mariadb:11.4
    restart: unless-stopped
    env_file: .env
    environment:
      # Compose substitutes these from the `.env` loaded above. The MariaDB
      # entrypoint uses them on first boot to create the database and the
      # least-privilege application user. `:?err` makes compose fail fast
      # with a friendly message if any value is missing at parse time.
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?run scripts/bootstrap.sh first}
      MARIADB_DATABASE: ${DB_NAME:?run scripts/bootstrap.sh first}
      MARIADB_USER: ${DB_USER:?run scripts/bootstrap.sh first}
      MARIADB_PASSWORD: ${DB_PASSWORD:?run scripts/bootstrap.sh first}
    volumes:
      - mariadb-data:/var/lib/mysql
    # No `ports:` — MariaDB is reachable only on the internal compose network.
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  # Named volumes survive `docker compose down` and are managed by Docker.
  # None of them are bind-mounted, so host paths stay clean.
  backend-uploads: {}
  redis-data: {}
  mariadb-data: {}
