# LiveKit Server Configuration
# Reference: https://docs.livekit.io/home/self-hosting/deployment/
# All secret values are injected via environment variables — never hardcode credentials here.

# Port LiveKit listens on for HTTP/WebSocket connections (Nginx proxies to this)
port: 7880

bind_addresses:
  - ""

rtc:
  # TCP fallback port for WebRTC (must be reachable from the internet)
  tcp_port: 7881
  # UDP media port range (must be open in firewall/security group)
  port_range_start: 50000
  port_range_end: 60000
  # Set to true for internet-facing deployments where the public IP differs from the bind address.
  # Set to false on bare-metal where public IP equals host IP.
  use_external_ip: true # Set to false on bare-metal where public IP equals host IP
  enable_loopback_candidate: false

redis:
  # redis-livekit is bound to 127.0.0.1:6379 on the host network
  address: 127.0.0.1:6379
  username: ""
  password: ""
  db: 0
  use_tls: false
  sentinel_master_name: ""
  sentinel_username: ""
  sentinel_password: ""
  sentinel_addresses: []
  cluster_addresses: []

turn:
  enabled: true
  # Replace with your actual TURN subdomain
  domain: livekit-turn.YOURDOMAIN.COM
  # TLS port for TURN — LiveKit handles TLS termination; Nginx passes through raw TCP
  tls_port: 5349
  # UDP port for STUN/TURN
  udp_port: 3478
  # LiveKit manages its own TLS cert for TURN
  external_tls: true
  # TURN TLS certificate paths — the livekit service mounts /etc/letsencrypt:/etc/letsencrypt:ro
  # Set these to the paths of your Certbot-issued certificate:
  #   cert_file: /etc/letsencrypt/live/livekit-turn.YOURDOMAIN.COM/fullchain.pem
  #   key_file: /etc/letsencrypt/live/livekit-turn.YOURDOMAIN.COM/privkey.pem

keys:
  # IMPORTANT: The Go YAML parser does NOT expand ${VAR} shell-style substitution.
  # You MUST replace the placeholders below with your actual LiveKit API key and secret.
  # The values in LIVEKIT_API_KEY / LIVEKIT_API_SECRET in .env are used by the CLI/tooling,
  # but livekit.yaml must contain the literal key and secret values.
  #
  # Format: YOUR_API_KEY: YOUR_API_SECRET
  # Example (replace with your own — do not use these sample values in production):
  #   myapikey123: myapisecretxxxxxxxxxxxxxxxxxxx
  replace_this_key: replace_this_secret
