# LiveKit Development Stack
#
# Cross-platform (macOS / Linux / Windows Docker Desktop) development environment.
# All services communicate over a named bridge network — no network_mode: host.
# No TLS, no Nginx, no Certbot required.
#
# Services:
#   livekit       - LiveKit server in --dev mode (no auth enforcement)       — bridge network
#   postgres      - PostgreSQL for the call-center-agent app                 — bridge network
#   redis-livekit - Redis dedicated to LiveKit message bus                   — bridge network
#   redis-app     - Redis for the call-center-agent app (port 6380)          — bridge network
#
# Usage:
#   docker compose -f docker-compose.development.yml --env-file .env.development up -d

services:
  # ---------------------------------------------------------------------------
  # LiveKit Server — dev mode (--dev disables auth enforcement, enables loopback)
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    ports:
      - '0.0.0.0:7880:7880' # HTTP / WebSocket
      - '0.0.0.0:7881:7881' # WebRTC TCP fallback
    volumes:
      - ./livekit.development.yaml:/livekit.development.yaml:ro
    command: --config /livekit.development.yaml --dev
    networks:
      - livekit-dev-net
    depends_on:
      - redis-livekit

  # ---------------------------------------------------------------------------
  # PostgreSQL — Application database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '0.0.0.0:5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - livekit-dev-net

  # ---------------------------------------------------------------------------
  # Redis — Dedicated message bus for LiveKit server (port 6379)
  # ---------------------------------------------------------------------------
  redis-livekit:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '0.0.0.0:6379:6379'
    networks:
      - livekit-dev-net

  # ---------------------------------------------------------------------------
  # Redis — Application cache / queue for call-center-agent app (port 6380)
  # Exposed on a different host port to avoid conflict with redis-livekit
  # ---------------------------------------------------------------------------
  redis-app:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '0.0.0.0:${REDIS_APP_PORT:-6380}:6379'
    networks:
      - livekit-dev-net

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_dev_data:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  livekit-dev-net:
    driver: bridge
