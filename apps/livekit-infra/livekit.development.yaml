# LiveKit Server — Development Configuration
# Reference: https://docs.livekit.io/home/self-hosting/deployment/
#
# This file is used with the --dev flag. It is intentionally simplified:
# no TLS, no TURN, no external IP detection.
# Service-to-service communication uses Docker bridge DNS (redis:6379).

# Port LiveKit listens on for HTTP/WebSocket connections
port: 7880

bind_addresses:
  - ""

rtc:
  # TCP fallback port for WebRTC
  tcp_port: 7881
  # UDP media port range — loopback works for same-machine dev
  port_range_start: 50000
  port_range_end: 60000
  # Disable external IP detection — not needed for local dev
  use_external_ip: false
  # Enable loopback candidates so browsers on the same machine can connect
  enable_loopback_candidate: true

redis:
  # Resolved via Docker bridge DNS — dedicated LiveKit Redis
  address: redis-livekit:6379
  username: ""
  password: ""
  db: 0
  use_tls: false
  sentinel_master_name: ""
  sentinel_username: ""
  sentinel_password: ""
  sentinel_addresses: []
  cluster_addresses: []

turn:
  # TURN is disabled in development — loopback candidates handle same-machine media
  enabled: false

keys:
  # Development API key and secret — safe to commit, these are dev-only values.
  # The --dev flag makes LiveKit match these internally.
  # Format: <api_key>: <api_secret>
  devkey: devsecret

webhook:
  # Must match one of the keys above — used to sign the JWT in Authorization header
  api_key: devkey
  urls:
    # host.docker.internal resolves to the Docker host on macOS/Windows Docker Desktop.
    # On Linux, add `extra_hosts: [host.docker.internal:host-gateway]` to the livekit
    # service in docker-compose.development.yml.
    - http://host.docker.internal:3000/webhook
