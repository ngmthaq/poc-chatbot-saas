# LiveKit server configuration.
#
# Environment variables (`${VAR}`) are substituted by LiveKit itself at
# startup — see the `env_file` directive in docker-compose.yml that loads
# `.env` into the container.

# WebSocket signalling port (HTTP/WS). Exposed on the host as 7880.
port: 7880

rtc:
  # TCP fallback for ICE candidates when UDP is blocked.
  tcp_port: 7881
  # Single UDP port for media. We map this 1:1 on the host to keep the
  # compose surface small and portable across Linux/macOS. Operators on
  # Linux who need a UDP range should consider `network_mode: host` (see
  # README "Production tuning").
  udp_port: 7882
  # Detect the host's public IP so SDP/ICE candidates work from the open
  # internet. Requires outbound access from the container.
  use_external_ip: true

redis:
  # Service name on the docker compose network.
  address: redis:6379
  # Password is injected from `.env` via `env_file` in docker-compose.yml.
  password: ${REDIS_PASSWORD}

keys:
  # LiveKit's key/secret pair. The map syntax is `key: secret`. Both come
  # from `.env` (generated by scripts/bootstrap.sh).
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

# `info` is the recommended default for production.
log_level: info

# ---------------------------------------------------------------------------
# Built-in TURN / TURN-TLS listener
# ---------------------------------------------------------------------------
#
# Uncomment the block below AFTER placing real `tls.crt` and `tls.key`
# into `./certs/` (mounted into the container at `/certs`). Leaving it
# commented on first run keeps the server from crash-looping on a fresh
# checkout where `./certs/` only contains `.gitkeep`.
#
# See README.md "TLS in production" for how to obtain the certificates
# (Caddy / Let's Encrypt) and which DNS records must point at this host.
#
# turn:
#   enabled: true
#   udp_port: 3478
#   tls_port: 5349
#   cert_file: /certs/tls.crt
#   key_file: /certs/tls.key
#   domain: ${LIVEKIT_TURN_DOMAIN}
