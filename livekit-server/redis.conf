# Redis configuration for the LiveKit stack.
#
# NOTE: The `requirepass` value below is a placeholder. The actual password
# is supplied at container start via the compose `command:` override
# (`--requirepass "$REDIS_PASSWORD"`) which reads from the `.env` file.
# This file is mounted read-only; keeping the placeholder here documents
# that auth IS required even when reading the config alone.

# Require AUTH for every connection. The real value is injected at runtime
# via the `--requirepass` CLI flag in docker-compose.yml. Leaving this
# directive in the config (with a placeholder) signals intent to readers
# and ensures Redis still requires auth if the CLI flag is ever removed.
requirepass ${REDIS_PASSWORD}

# Enable the Append-Only File for durable writes. Combined with the named
# `redis-data` volume this gives us crash-recoverable persistence.
appendonly yes

# `notice` is Redis's recommended production log level — informative without
# the noise of `debug`/`verbose`.
loglevel notice

# Listen on all interfaces inside the container. The container is on an
# isolated docker compose network with NO published ports, so this is not
# externally reachable.
bind 0.0.0.0

# Refuse connections from non-loopback interfaces unless `requirepass` is
# set. Defence-in-depth: combined with `requirepass` and the isolated
# compose network, anonymous access is blocked at three layers.
protected-mode yes
