# Compose v2 — no `version:` key (Docker ignores it on v2 anyway).
#
# Two services on a default bridge network: `livekit` (publishes WS/RTC/TURN
# ports) and `redis` (internal only, no published ports). Secrets come from
# `.env`, which is created by `scripts/bootstrap.sh`.

services:
  livekit:
    # Pinned image tag — see README "Versions / Assumptions". Never `:latest`.
    image: livekit/livekit-server:v1.7.2
    restart: unless-stopped
    env_file: .env
    environment:
      # LiveKit does NOT substitute ${VAR} inside livekit.yaml; the server only
      # honors `LIVEKIT_KEYS` (parsed by the --keys flag) for the key/secret
      # pair. Docker Compose performs ${VAR} substitution HERE at parse time,
      # sourcing values from `.env` in this directory.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: ["--config", "/etc/livekit/livekit.yaml"]
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
      - ./certs:/certs:ro
    ports:
      # WebSocket signalling (HTTP/WS). Front with a reverse proxy for TLS.
      - "7880:7880"
      # RTC TCP fallback.
      - "7881:7881"
      # RTC UDP media.
      - "7882:7882/udp"
      # Built-in TURN UDP (only active once TURN block is uncommented in
      # livekit.yaml). Published preemptively so enabling TURN is a single
      # config edit, not a compose change.
      - "3478:3478/udp"
      - "3478:3478/tcp"
      # Built-in TURN TLS.
      - "5349:5349/tcp"
    healthcheck:
      # The official livekit-server image is based on a minimal distro that
      # does NOT ship curl or wget. We probe the TCP listener directly via
      # /dev/tcp (bash built-in) using the shell that ships in the image.
      # If your image variant lacks bash, switch to `nc -z localhost 7880`.
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/7880' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    # Shell-form (`sh -c`) is required: exec-form skips the shell, so
    # `$REDIS_PASSWORD` would be passed literally to redis-server instead of
    # expanded. Compose un-escapes `$$` to `$` at parse-time, so the in-
    # container shell sees `$REDIS_PASSWORD` and expands it from the env
    # loaded via `env_file`. Leading `exec` replaces the shell with redis-
    # server so it inherits PID 1 and `docker compose down` signals it cleanly.
    command: ["sh", "-c", "exec redis-server /usr/local/etc/redis/redis.conf --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    # No `ports:` — Redis is reachable only on the internal compose network.
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  # Named volume so Redis AOF survives container recreation. Managed by
  # Docker — not committed.
  redis-data: {}
